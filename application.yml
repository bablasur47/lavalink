# ==============================================================================
# UNIFIED PLUGINS CORE SETTINGS
# ==============================================================================
plugins:
  # 1. Download Dependencies List
  - dependency: "dev.lavalink.youtube:youtube-plugin:1.11.5"
  - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.3.0"
  - dependency: "com.github.topi314.lavasearch:lavasearch-plugin:1.0.0"
  - dependency: "com.github.topi314.sponsorblock:sponsorblock-plugin:3.0.1"
  - dependency: "com.github.topi314.lavalyrics:lavalyrics-plugin:1.0.0"

  # 2. LavaSrc Plugin Configurations (Spotify, Apple Music, etc.)
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\"" 
      - "ytsearch:%QUERY%"    
    sources:
      spotify: true
      applemusic: true
      deezer: false
      yandexmusic: false
      flowerytts: false
      vkmusic: false
    spotify:
      clientId: "YOUR_SPOTIFY_CLIENT_ID" # Update with yours if applicable
      clientSecret: "YOUR_SPOTIFY_CLIENT_SECRET"
      countryCode: "US"
      playlistLoadLimit: 6 
      albumLoadLimit: 6
    applemusic:
      countryCode: "US"
      mediaAPIToken: "" 

  # 3. SponsorBlock Configuration
  sponsorblock:
    categories:
      - "sponsor"
      - "intro"
      - "outro"
      - "interaction"
      - "selfpromo"
      - "music_offtopic"

# ==============================================================================
# LAVALINK CORE APPLICATION INSTANCE STACK
# ==============================================================================
server:
  port: 10000             # Mandatory for Render dynamic routing
  address: 0.0.0.0
  http2:
    enabled: false

lavalink:
  pluginsDir: "./plugins"
  server:
    password: "YourStrongPasswordHere" # Change this to secure your node!
    sources:
      youtube: false      # Replaced by the native youtube-plugin dependency above
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: HIGH
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

# YouTube Plugin Settings Area
youtube:
  potoken: ""
  visitorData: ""

# Logging Metrics Config
metrics:
  prometheus:
    enabled: true       # Active for your UptimeRobot ping loop

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO