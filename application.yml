plugins:
  - dependency: "dev.lavalink.youtube:youtube-plugin:1.11.5"
  - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.3.0"
  - dependency: "com.github.topi314.lavasearch:lavasearch-plugin:1.0.0"
  - dependency: "com.github.topi314.sponsorblock:sponsorblock-plugin:3.0.1"
  - dependency: "com.github.topi314.lavalyrics:lavalyrics-plugin:1.0.0"

server:
  port: 10001
  address: 0.0.0.0
  http2:
    enabled: false

lavalink:
  pluginsDir: "./plugins"
  server:
    password: "YourStrongPasswordHere" # Change this to secure your node connection
    sources:
      youtube: false      # Set to false because dev.lavalink.youtube plugin replaces it
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: HIGH
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

# ==============================================================================
# PLUGIN-SPECIFIC CONFIGURATION BLOCKS
# ==============================================================================

# 1. YouTube Plugin Settings
# If your node gets hit with 429 rate limits, paste your account oauth refresh token below
youtube:
  potoken: ""
  visitorData: ""
  # oauth:
  #   refreshToken: "your_refresh_token_here"
  #   skipInitialization: false

# 2. LavaSrc Plugin Settings (Spotify, Apple Music, etc.)
# Get your credentials at https://developer.spotify.com/dashboard
lavasrc:
  providers:
    - "ytsearch:\"%ISRC%\"" # Looks up metadata via precise ISRC registry first
    - "ytsearch:%QUERY%"    # Falls back to traditional search string matching
  sources:
    spotify: true
    applemusic: false
    deezer: false
    yandexmusic: false
    flowerytts: false
    vkmusic: false
  spotify:
    clientId: "YOUR_SPOTIFY_CLIENT_ID"
    clientSecret: "YOUR_SPOTIFY_CLIENT_SECRET"
    countryCode: "US"
    playlistLoadLimit: 6
    albumLoadLimit: 6

# 3. SponsorBlock Configuration
sponsorblock:
  categories:
    - "sponsor"
    - "intro"
    - "outro"
    - "interaction"
    - "selfpromo"
    - "music_offtopic"

# ==============================================================================
# LOGGING & CORE METRICS
# ==============================================================================

metrics:
  prometheus:
    enabled: false

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO